<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivia Clarios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#000000;
    --dark-purple:#310B55;
    --navy:#202498;
    --teal:#007F9A;
    --blue:#0099C8;
    --light-blue:#00C2EC;
    --dark-gray:#393D3D;
    --gray:#A8A8A8;
    --light-gray-1:#EAEBEB;
    --light-gray-2:#F8F7F7;
    --white:#ffffff;
    --gold:#F2B705;
    --silver:#C7CDD4;
    --bronze:#D98E4A;
    --danger:#E0473E;
    --success:#0FA968;
    --radio-lg:24px;
    --radio-md:16px;
    --radio-sm:12px;
  }

  *{box-sizing:border-box;}

  html{height:100%;}

  body{
    margin:0;
    min-height:100vh;
    font-family:'Montserrat',system-ui,-apple-system,sans-serif;
    color:var(--black);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:clamp(12px, 4vw, 32px);
    overflow-x:hidden;
    background:
      radial-gradient(circle at 15% 8%, rgba(0,194,236,0.35), transparent 38%),
      radial-gradient(circle at 90% 85%, rgba(0,127,154,0.30), transparent 42%),
      linear-gradient(160deg, var(--dark-purple) 0%, var(--navy) 55%, #14176b 100%);
  }

  .stage{width:100%; max-width:420px;}

  /* ---------- Marco tipo "app" ---------- */
  .phone{
    background:var(--white);
    border-radius:32px;
    overflow:hidden;
    box-shadow:0 30px 70px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.06);
    position:relative;
  }

  .topbar{
    background:var(--black);
    padding:20px 24px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }

  .logo-mark{
    height:16px;
    width:auto;
    display:block;
  }

  .topbar .pill{
    font-size:11px;
    font-weight:600;
    color:var(--light-blue);
    background:rgba(0,194,236,0.12);
    border:1px solid rgba(0,194,236,0.3);
    padding:5px 12px;
    border-radius:20px;
    letter-spacing:0.03em;
  }

  .sheet{padding:30px 26px 28px;}

  h1.title{
    font-family:'Montserrat',sans-serif;
    font-weight:800;
    font-size:25px;
    margin:0 0 8px;
    color:var(--dark-purple);
    letter-spacing:-0.01em;
  }

  p.lead{
    margin:0 0 26px;
    color:var(--dark-gray);
    opacity:0.75;
    font-size:14.5px;
    line-height:1.55;
    font-weight:400;
  }

  label.field-label{
    display:block;
    font-size:12.5px;
    font-weight:700;
    color:var(--navy);
    margin-bottom:7px;
    letter-spacing:0.02em;
    text-transform:uppercase;
  }

  .step-dots{
    display:flex;
    gap:6px;
    margin-bottom:18px;
  }
  .step-dots span{
    height:5px;
    flex:1;
    border-radius:4px;
    background:var(--light-gray-1);
  }
  .step-dots span.active{background:var(--light-blue);}

  /* ---------- Pantalla de bienvenida / premios ---------- */

  .hype-banner{
    background:linear-gradient(135deg, var(--dark-purple), var(--navy));
    border-radius:var(--radio-md);
    padding:22px 18px;
    margin-bottom:22px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .hype-banner::before{
    content:'';
    position:absolute;
    inset:0;
    background:radial-gradient(circle at 85% 0%, rgba(0,194,236,0.35), transparent 55%);
  }
  .hype-banner .hype-title{
    position:relative;
    font-size:19px;
    font-weight:800;
    color:#fff;
    margin:0 0 10px;
    letter-spacing:0.01em;
    line-height:1.3;
    text-transform:uppercase;
  }
  .hype-banner .hype-title2{
    position:relative;
    font-size:15.5px;
    font-weight:800;
    color:var(--light-blue);
    margin:0 0 10px;
    letter-spacing:0.01em;
    text-transform:uppercase;
  }
  .hype-banner .hype-sub{
    position:relative;
    font-size:12px;
    font-weight:700;
    color:#fff;
    opacity:0.85;
    letter-spacing:0.02em;
    padding-top:10px;
    border-top:1px solid rgba(255,255,255,0.18);
  }

  .prizes-label{
    font-size:12px;
    font-weight:800;
    color:var(--navy);
    text-transform:uppercase;
    letter-spacing:0.04em;
    margin-bottom:12px;
    text-align:center;
  }

  .prizes-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:22px;
  }
  .prize-card{
    background:var(--light-gray-2);
    border:1.5px solid var(--light-gray-1);
    border-radius:var(--radio-sm);
    padding:14px 10px;
    text-align:center;
    transition:transform .15s, box-shadow .15s;
  }
  .prize-card.wide{grid-column:1 / -1; display:flex; align-items:center; gap:14px; text-align:left; padding:14px 16px;}

  .prize-icon{
    width:46px; height:46px;
    border-radius:50%;
    background:linear-gradient(135deg, var(--light-blue), var(--teal));
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 8px;
    flex-shrink:0;
    box-shadow:0 6px 14px rgba(0,194,236,0.3);
  }
  .prize-card.wide .prize-icon{margin:0;}
  .prize-icon svg{width:24px; height:24px;}

  .prize-name{font-size:12.5px; font-weight:700; color:var(--black); line-height:1.3;}
  .prize-card.wide .prize-name{font-size:13.5px;}


  input[type="text"]{
    width:100%;
    padding:15px 16px;
    border:2px solid var(--light-gray-1);
    border-radius:var(--radio-sm);
    font-size:16px;
    margin-bottom:18px;
    font-family:inherit;
    font-weight:500;
    transition:border-color .15s, box-shadow .15s;
    background:var(--light-gray-2);
  }
  input[type="text"]:focus{
    outline:none;
    border-color:var(--light-blue);
    background:var(--white);
    box-shadow:0 0 0 4px rgba(0,194,236,0.14);
  }

  button{font-family:inherit; cursor:pointer; border:none;}

  .btn-primary{
    width:100%;
    background:var(--navy);
    background-image:linear-gradient(135deg, var(--navy), var(--dark-purple));
    color:#fff;
    font-weight:700;
    font-size:15.5px;
    padding:16px;
    border-radius:var(--radio-sm);
    letter-spacing:0.01em;
    transition:transform .12s, box-shadow .12s, opacity .12s;
    box-shadow:0 8px 20px rgba(32,36,152,0.35);
  }
  .btn-primary:hover{transform:translateY(-1px);}
  .btn-primary:active{transform:scale(0.98);}
  .btn-primary:disabled{background:var(--light-gray-1); color:var(--gray); box-shadow:none; cursor:not-allowed;}

  .btn-secondary{
    width:100%;
    background:var(--light-gray-2);
    color:var(--navy);
    font-weight:600;
    font-size:14.5px;
    padding:13px;
    border-radius:var(--radio-sm);
    border:2px solid var(--light-gray-1);
  }

  .btn-ghost{
    width:100%;
    background:transparent;
    color:var(--gray);
    font-size:13px;
    font-weight:600;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
  }

  .btn-row{display:flex; gap:10px;}
  .btn-row .btn-secondary{flex:1;}
  .btn-row .btn-primary{flex:2;}

  /* ---------- Pantalla de pregunta ---------- */

  .q-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:20px;
  }

  .q-progress-wrap{flex:1; margin-right:16px;}

  .q-progress-label{
    font-size:12px;
    font-weight:700;
    color:var(--navy);
    margin-bottom:6px;
    letter-spacing:0.02em;
  }
  .q-progress-track{
    height:8px;
    background:var(--light-gray-1);
    border-radius:8px;
    overflow:hidden;
  }
  .q-progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--light-blue), var(--teal));
    border-radius:8px;
    transition:width .3s ease;
  }

  .timer-ring{position:relative; width:54px; height:54px; flex-shrink:0;}
  .timer-ring svg{transform:rotate(-90deg);}
  .timer-ring .track{stroke:var(--light-gray-1);}
  .timer-ring .progress{
    stroke:var(--light-blue);
    transition:stroke-dashoffset 1s linear, stroke .2s;
  }
  .timer-ring.urgent .progress{stroke:var(--danger);}
  .timer-ring .num{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-size:17px; font-weight:800; color:var(--navy);
  }
  .timer-ring.urgent .num{color:var(--danger);}

  h2.question{
    font-size:18.5px;
    line-height:1.42;
    color:var(--black);
    margin:0 0 20px;
    font-weight:700;
  }

  .opciones{display:flex; flex-direction:column; gap:10px; margin-bottom:6px;}

  .opcion{
    text-align:left;
    width:100%;
    padding:15px 16px;
    border:2px solid var(--light-gray-1);
    border-radius:var(--radio-sm);
    background:var(--light-gray-2);
    font-size:14.5px;
    font-weight:600;
    color:var(--black);
    display:flex;
    align-items:center;
    gap:12px;
    transition:border-color .12s, background .12s, transform .1s;
  }
  .opcion:hover:not(:disabled){
    border-color:var(--light-blue);
    background:var(--white);
    transform:translateY(-1px);
  }
  .opcion:disabled{cursor:default;}

  .opcion .letra{
    width:28px; height:28px;
    border-radius:50%;
    background:var(--white);
    color:var(--navy);
    font-weight:800;
    font-size:13px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
    border:2px solid var(--light-gray-1);
  }

  .opcion.correcta{border-color:var(--success); background:#e4f7ee;}
  .opcion.correcta .letra{background:var(--success); color:#fff; border-color:var(--success);}

  .opcion.incorrecta{border-color:var(--danger); background:#fcebea;}
  .opcion.incorrecta .letra{background:var(--danger); color:#fff; border-color:var(--danger);}

  .feedback-line{
    min-height:22px;
    font-size:13px;
    font-weight:700;
    margin-top:12px;
  }
  .feedback-line.ok{color:var(--success);}
  .feedback-line.bad{color:var(--danger);}
  .feedback-line.skip{color:var(--gray);}

  .score-strip{
    margin-top:18px;
    padding:14px 16px;
    background:var(--light-gray-2);
    border-radius:var(--radio-sm);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .score-strip .item{text-align:center; flex:1;}
  .score-strip .item .v{font-size:17px; font-weight:800; color:var(--navy);}
  .score-strip .item .l{font-size:10px; color:var(--gray); font-weight:700; text-transform:uppercase; letter-spacing:0.04em; margin-top:1px;}
  .score-strip .divider{width:1px; height:24px; background:var(--light-gray-1);}

  /* ---------- Pantalla final ---------- */

  .final{text-align:center;}
  .final .badge-final{
    width:88px; height:88px; border-radius:50%;
    background:linear-gradient(135deg, var(--light-blue), var(--teal));
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 18px;
    box-shadow:0 10px 24px rgba(0,194,236,0.35);
  }
  .final .badge-final svg{width:42px; height:42px;}

  .final-stats{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    margin:22px 0;
  }
  .stat{
    background:var(--light-gray-2);
    border-radius:var(--radio-sm);
    padding:16px 6px;
    border:1px solid var(--light-gray-1);
  }
  .stat .v{font-size:21px; color:var(--navy); font-weight:800;}
  .stat .l{font-size:10.5px; color:var(--gray); text-transform:uppercase; letter-spacing:0.03em; margin-top:3px; font-weight:700;}

  .loading-dot{
    display:inline-block;
    width:7px; height:7px; border-radius:50%;
    background:var(--blue);
    animation:pulse 1s infinite ease-in-out;
  }
  @keyframes pulse{0%,100%{opacity:0.25;}50%{opacity:1;}}

  /* ---------- Admin / leaderboard ---------- */

  .rank-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 14px;
    border-radius:var(--radio-sm);
    margin-bottom:8px;
    background:var(--light-gray-2);
    border:1px solid var(--light-gray-1);
  }
  .rank-row.top1{background:linear-gradient(135deg, #fff8e6, #fff); border-color:var(--gold);}
  .rank-row.top2{background:linear-gradient(135deg, #f5f7f9, #fff); border-color:var(--silver);}
  .rank-row.top3{background:linear-gradient(135deg, #fbf1e8, #fff); border-color:var(--bronze);}

  .medal{
    width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:13px; color:#fff;
    flex-shrink:0;
    background:var(--gray);
  }
  .medal.m1{background:var(--gold);}
  .medal.m2{background:var(--silver); color:var(--dark-gray);}
  .medal.m3{background:var(--bronze);}

  .rank-info{flex:1; min-width:0;}
  .rank-name{font-size:13.5px; font-weight:700; color:var(--black); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .rank-sub{font-size:11px; color:var(--gray); font-weight:600;}
  .rank-pts{font-size:16px; font-weight:800; color:var(--navy); flex-shrink:0;}

  .section-label{
    font-size:11px;
    font-weight:800;
    color:var(--gray);
    text-transform:uppercase;
    letter-spacing:0.05em;
    margin:18px 0 10px;
  }
  .section-label:first-child{margin-top:0;}

  .pager{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-top:14px;
  }
  .pager-btn{
    flex:1;
    background:var(--light-gray-2);
    color:var(--navy);
    font-weight:700;
    font-size:13px;
    padding:11px;
    border-radius:10px;
    border:2px solid var(--light-gray-1);
    transition:opacity .15s;
  }
  .pager-btn:disabled{opacity:0.35; cursor:not-allowed;}
  .pager-info{
    font-size:12px;
    font-weight:700;
    color:var(--gray);
    white-space:nowrap;
  }

  .top-right-link{
    position:fixed;
    bottom:16px;
    right:16px;
    font-size:11px;
    font-weight:600;
    color:rgba(255,255,255,0.4);
    text-decoration:none;
    z-index:5;
  }

  .err-msg{
    color:var(--danger);
    font-size:12.5px;
    font-weight:600;
    margin:-10px 0 14px;
    min-height:16px;
  }

  .notice-box{
    display:flex;
    align-items:flex-start;
    gap:10px;
    background:#fff7e0;
    border:1.5px solid var(--gold);
    border-radius:var(--radio-sm);
    padding:12px 14px;
    margin:-4px 0 18px;
  }
  .notice-box .notice-icon{
    font-size:16px;
    line-height:1;
    flex-shrink:0;
  }
  .notice-box .notice-text{
    font-size:12.5px;
    font-weight:700;
    color:#7a5400;
    line-height:1.4;
  }

  /* ---------- Responsivo ---------- */

  /* Celulares muy pequeños (320–380px) */
  @media (max-width:380px){
    .sheet{padding:22px 18px;}
    .topbar{padding:14px 18px;}
    h1.title{font-size:22px;}
    p.lead{font-size:13.5px;}
    .logo-mark{height:14px;}
    .timer-ring{width:48px; height:48px;}
    .timer-ring svg{width:48px; height:48px;}
    h2.question{font-size:17px;}
    .opcion{padding:13px 14px; font-size:13.5px;}
    .final-stats{gap:8px;}
    .stat{padding:13px 4px;}
    .stat .v{font-size:18px;}
  }

  /* Tablets y desktop: la tarjeta crece y respira más, ya no se siente "perdida" */
  @media (min-width:700px){
    .stage{max-width:480px;}
    .phone{border-radius:36px;}
    .sheet{padding:40px 44px 36px;}
    .topbar{padding:24px 32px 22px;}
    .logo-mark{height:19px;}
    h1.title{font-size:28px;}
    p.lead{font-size:15.5px;}
    .opcion{padding:17px 20px; font-size:15.5px;}
    h2.question{font-size:20px;}
    .timer-ring{width:60px; height:60px;}
    .timer-ring svg{width:60px; height:60px;}
  }

  /* Desktop grande: limitar a un ancho de lectura cómodo, evitar que se vea minúscula en pantallas anchas */
  @media (min-width:1100px){
    .stage{max-width:520px;}
    .sheet{padding:46px 50px 40px;}
  }

  /* Pantallas bajas (laptops con poca altura, celular en horizontal) */
  @media (max-height:680px) and (min-width:700px){
    .sheet{padding:28px 40px 26px;}
  }

  /* Altura muy reducida (celular horizontal): permitir scroll en vez de recortar contenido */
  @media (max-height:480px){
    body{align-items:flex-start; padding-top:16px; padding-bottom:16px;}
  }
</style>
</head>
<body>

<div class="stage">
  <div class="phone" id="card"></div>
</div>

<a href="#" class="top-right-link" id="adminLink">admin</a>

/* ============================================================

   ============================================================ */
function shuffle(array){
  const a = array.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function prepararPreguntas(){
  const base = shuffle(PREGUNTAS_BASE);
  return base.map(p => {
    const indices = shuffle([0, 1, 2]);
    const opciones = indices.map(i => p.opciones[i]);
    const nuevaCorrecta = indices.indexOf(p.correcta);
    return { pregunta: p.pregunta, opciones, correcta: nuevaCorrecta };
  });
}

function calcularPuntos(esCorrecta, segundosRestantes){
  if(!esCorrecta) return 0;
  const PUNTOS_BASE = 50;
  const BONO_MAX = 250;
  const fraccionTiempo = segundosRestantes / CONFIG.TIEMPO_PREGUNTA; // 0 a 1
  const bono = Math.round(BONO_MAX * Math.pow(fraccionTiempo, 2)); // curva cuadrática: premia mucho más a quien contesta rápido
  return PUNTOS_BASE + bono;
}

            </svg>
          </div>

        </div>
      </div>

      <button class="btn-primary" id="btnIniciarTrivia">Iniciar trivia</button>

  `;

  document.getElementById('btnIniciarTrivia').addEventListener('click', pantallaNumEmpleado);
}

   PASO 1: NÚMERO DE EMPLEADO
   ============================================================ */

    <div class="sheet">
      <div class="step-dots"><span class="active"></span><span class="active"></span><span></span></div>

      <p class="lead">18 preguntas sobre Clarios y el Mundial 2026. Tienes 15 segundos por pregunta: entre más rápido contestes bien, más puntos ganas.</p>
      <label class="field-label" for="empInput">Número de empleado</label>
      <input type="text" id="empInput" placeholder="Ej. 48213" maxlength="20" autocomplete="off" inputmode="numeric">

        <button class="btn-primary" id="btnSiguiente">Continuar</button>

    </div>
  `;

  const input = document.getElementById('empInput');

/* ============================================================
   PASO 2: NOMBRE
   ============================================================ */
function pantallaNombre(){
  card.innerHTML = `
    <div class="topbar">
      ${LOGO_SVG}
      <span class="pill">Trivia</span>
    </div>
    <div class="sheet">
      <div class="step-dots"><span class="active"></span><span class="active"></span><span class="active"></span></div>

      <p class="lead">Tu nombre aparecerá en el ranking de mejores resultados.</p>

        <button class="btn-secondary" id="btnAtras">Atrás</button>
        <button class="btn-primary" id="btnEmpezar">Comenzar trivia</button>
      </div>
    </div>
  `;

  const input = document.getElementById('nombreInput');
  const btn = document.getElementById('btnEmpezar');
  const err = document.getElementById('errMsg');

  document.getElementById('btnAtras').addEventListener('click', pantallaNumEmpleado);

    const val = input.value.trim();
    if(val.length < 2){
      err.textContent = 'Escribe tu nombre completo.';
      input.focus();
      return;
    }
    state.nombre = val;
    state.preguntas = prepararPreguntas();
    state.indice = 0;
    state.puntuacion = 0;
    state.aciertos = 0;
    state.tiempos = [];
    pantallaPregunta();

  btn.addEventListener('click', intentarEmpezar);

/* ============================================================
   PANTALLA: PREGUNTA
   ============================================================ */
function pantallaPregunta(){
  state.respondida = false;
  state.segundosRestantes = CONFIG.TIEMPO_PREGUNTA;
  const q = state.preguntas[state.indice];
  const total = state.preguntas.length;
  const letras = ['A', 'B', 'C'];
  const pctAvance = Math.round((state.indice / total) * 100);

  const RADIO = 23, CIRC = 2 * Math.PI * RADIO;

  card.innerHTML = `
    <div class="topbar">
      ${LOGO_SVG}
      <span class="pill">${state.nombre.split(' ')[0]}</span>
    </div>
    <div class="sheet">
      <div class="q-header">
        <div class="q-progress-wrap">
          <div class="q-progress-label">Pregunta ${state.indice + 1} de ${total}</div>
          <div class="q-progress-track"><div class="q-progress-fill" style="width:${pctAvance}%;"></div></div>
        </div>
        <div class="timer-ring" id="timerRing">
          <svg width="54" height="54" viewBox="0 0 54 54">
            <circle class="track" cx="27" cy="27" r="${RADIO}" fill="none" stroke-width="5"></circle>
            <circle class="progress" id="ringProgress" cx="27" cy="27" r="${RADIO}" fill="none" stroke-width="5"
              stroke-dasharray="${CIRC}" stroke-dashoffset="0" stroke-linecap="round"></circle>
          </svg>
          <div class="num" id="ringNum">${CONFIG.TIEMPO_PREGUNTA}</div>
        </div>
      </div>
      <h2 class="question">${q.pregunta}</h2>
      <div class="opciones" id="opcionesBox">
        ${q.opciones.map((op, i) => `
          <button class="opcion" data-i="${i}">
            <span class="letra">${letras[i]}</span>
            <span>${op}</span>
          </button>
        `).join('')}
      </div>
      <div class="feedback-line" id="feedback"></div>
      <div class="score-strip">
        <div class="item"><div class="v" id="aciertosLbl">${state.aciertos}</div><div class="l">Aciertos</div></div>
        <div class="divider"></div>
        <div class="item"><div class="v" id="puntosLbl">${state.puntuacion}</div><div class="l">Puntos</div></div>
      </div>
    </div>
  `;

  const botones = Array.from(document.querySelectorAll('.opcion'));
  botones.forEach(b => b.addEventListener('click', () => responder(parseInt(b.dataset.i, 10))));

  const ring = document.getElementById('timerRing');
  const ringProgress = document.getElementById('ringProgress');
  const ringNum = document.getElementById('ringNum');

  function tick(){
    const pct = state.segundosRestantes / CONFIG.TIEMPO_PREGUNTA;
    ringProgress.setAttribute('stroke-dashoffset', String(CIRC * (1 - pct)));
    ringNum.textContent = state.segundosRestantes;
    if(state.segundosRestantes <= 5){
      ring.classList.add('urgent');
    }
  }
  tick();

  state.timerInterval = setInterval(() => {
    state.segundosRestantes -= 1;
    tick();
    if(state.segundosRestantes <= 0){
      clearInterval(state.timerInterval);
      responder(null);
    }
  }, 1000);
}

function responder(indiceElegido){
  if(state.respondida) return;
  state.respondida = true;
  clearInterval(state.timerInterval);

  const q = state.preguntas[state.indice];
  const botones = Array.from(document.querySelectorAll('.opcion'));
  const feedback = document.getElementById('feedback');
  const segundosUsados = CONFIG.TIEMPO_PREGUNTA - state.segundosRestantes;

  botones.forEach(b => b.disabled = true);

  const esCorrecta = indiceElegido === q.correcta;

  if(indiceElegido === null){
    feedback.textContent = 'Tiempo agotado. No contestaste a tiempo.';
    feedback.className = 'feedback-line skip';
  } else if(esCorrecta){
    feedback.textContent = '¡Correcto!';
    feedback.className = 'feedback-line ok';
    botones[indiceElegido].classList.add('correcta');
  } else {
    feedback.textContent = `Incorrecto. La respuesta correcta era "${q.opciones[q.correcta]}".`;
    feedback.className = 'feedback-line bad';
    botones[indiceElegido].classList.add('incorrecta');
    botones[q.correcta].classList.add('correcta');
  }

  const puntos = calcularPuntos(esCorrecta, state.segundosRestantes);
  state.puntuacion += puntos;
  if(esCorrecta) state.aciertos += 1;
  state.tiempos.push(indiceElegido === null ? CONFIG.TIEMPO_PREGUNTA : segundosUsados);

  document.getElementById('aciertosLbl').textContent = state.aciertos;
  document.getElementById('puntosLbl').textContent = state.puntuacion;

  setTimeout(() => {
    state.indice += 1;
    if(state.indice < state.preguntas.length){
      pantallaPregunta();
    } else {
      pantallaFinal();
    }
  }, 1600);
}

/* ============================================================
   PANTALLA: FINAL
   ============================================================ */
function pantallaFinal(){
  const total = state.preguntas.length;
  const tiempoPromedio = state.tiempos.length
    ? (state.tiempos.reduce((a, b) => a + b, 0) / state.tiempos.length)
    : 0;

  card.innerHTML = `
    <div class="topbar">
      ${LOGO_SVG}
      <span class="pill">${state.nombre.split(' ')[0]}</span>
    </div>
    <div class="sheet final">
      <div class="badge-final">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <h1 class="title">¡Gracias por participar!</h1>
      <p class="lead">Tu resultado quedó registrado. ¡Sigue así!</p>
      <div class="final-stats">
        <div class="stat"><div class="v">${state.aciertos}/${total}</div><div class="l">Aciertos</div></div>
        <div class="stat"><div class="v">${state.puntuacion}</div><div class="l">Puntos</div></div>
        <div class="stat"><div class="v">${tiempoPromedio.toFixed(1)}s</div><div class="l">T. promedio</div></div>
      </div>
      <div id="saveStatus" style="font-size:13px; color:var(--gray); margin-bottom:16px; font-weight:600;">
        <span class="loading-dot"></span> Guardando resultado…
      </div>
      <button class="btn-primary" id="btnReiniciar">Jugar de nuevo</button>
    </div>
  `;

  document.getElementById('btnReiniciar').addEventListener('click', pantallaInicio);

  guardarResultado(tiempoPromedio);
}

async function guardarResultado(tiempoPromedio){
  const statusEl = document.getElementById('saveStatus');
  if(!CONFIG.API_URL || CONFIG.API_URL.includes('PEGA_AQUI')){
    if(statusEl) statusEl.innerHTML = 'Resultado no enviado (falta configurar API_URL).';
    return;
  }
  try{
    const params = new URLSearchParams({
      action: 'submit',
      numEmpleado: state.numEmpleado,
      nombre: state.nombre,
      puntuacion: state.puntuacion,
      aciertos: state.aciertos,
      totalPreguntas: state.preguntas.length,
      tiempoPromedio: tiempoPromedio.toFixed(1)
    });
    const res = await fetch(`${CONFIG.API_URL}?${params.toString()}`);
    const data = await res.json();
    if(statusEl){
      statusEl.textContent = data.ok ? 'Resultado guardado correctamente.' : 'No se pudo guardar el resultado.';
    }
  } catch(e){
    if(statusEl) statusEl.textContent = 'No se pudo guardar el resultado (sin conexión).';
  }
}

async function pantallaAdminResultados(){
  card.innerHTML = `
    <div class="topbar">
      ${LOGO_SVG}
      <span class="pill">Admin</span>
    </div>
    <div class="sheet">
      <h1 class="title">Resultados</h1>
      <p class="lead"><span class="loading-dot"></span> Cargando resultados…</p>
    </div>
  `;

  if(!CONFIG.API_URL || CONFIG.API_URL.includes('PEGA_AQUI')){
    card.querySelector('.sheet').innerHTML = `
      <h1 class="title">Resultados</h1>
      <p class="lead">Falta configurar CONFIG.API_URL con la URL de tu Web App de Apps Script.</p>
      <button class="btn-primary" id="btnVolverAdmin">Volver</button>
    `;
    document.getElementById('btnVolverAdmin').addEventListener('click', pantallaInicio);
    return;
  }

  try{
    const res = await fetch(`${CONFIG.API_URL}?action=all`);
    const data = await res.json();
    const filas = (data.ok ? data.resultados : []).slice().sort((a, b) => {
      if(b.puntuacion !== a.puntuacion) return b.puntuacion - a.puntuacion;
      if(b.aciertos !== a.aciertos) return b.aciertos - a.aciertos;
      return Number(a.tiempoPromedio) - Number(b.tiempoPromedio);
    });

    let adminPage = 0; // página actual del resto de concursantes (a partir del puesto 11)
    const POR_PAGINA = 10;
    const top10 = filas.slice(0, 10);
    const resto = filas.slice(10);
    const totalPaginas = Math.max(1, Math.ceil(resto.length / POR_PAGINA));

    const medalClass = i => i === 0 ? 'm1' : i === 1 ? 'm2' : i === 2 ? 'm3' : '';
    const rowClass = i => i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';

    function filaHTML(r, posicion){
      return `
        <div class="rank-row ${rowClass(posicion)}">
          <div class="medal ${medalClass(posicion)}">${posicion + 1}</div>
          <div class="rank-info">
            <div class="rank-name">${r.nombre}</div>
            <div class="rank-sub">No. ${r.numEmpleado || '—'} · ${r.aciertos}/${r.totalPreguntas} aciertos · ${Number(r.tiempoPromedio).toFixed(1)}s</div>
          </div>
          <div class="rank-pts">${r.puntuacion}</div>
        </div>
      `;
    }

    function render(){
      const sheet = card.querySelector('.sheet');
      const inicioResto = adminPage * POR_PAGINA;
      const paginaResto = resto.slice(inicioResto, inicioResto + POR_PAGINA);

      sheet.innerHTML = `
        <h1 class="title">Resultados</h1>
        <p class="lead">${filas.length} participaciones registradas, ordenadas por puntuación.</p>

        <div class="section-label">Top 10</div>
        ${top10.map((r, i) => filaHTML(r, i)).join('') || '<p style="text-align:center; color:var(--gray); font-size:13px;">Sin registros aún</p>'}

        ${resto.length > 0 ? `
          <div class="section-label">Demás concursantes</div>
          ${paginaResto.map((r, i) => filaHTML(r, inicioResto + 10 + i)).join('')}
          <div class="pager">
            <button class="pager-btn" id="btnPagAnt" ${adminPage === 0 ? 'disabled' : ''}>← Anterior</button>
            <span class="pager-info">Página ${adminPage + 1} de ${totalPaginas}</span>
            <button class="pager-btn" id="btnPagSig" ${adminPage >= totalPaginas - 1 ? 'disabled' : ''}>Siguiente →</button>
          </div>
        ` : ''}

        <button class="btn-primary" id="btnVolverAdmin" style="margin-top:18px;">Volver a la trivia</button>
      `;

      document.getElementById('btnVolverAdmin').addEventListener('click', pantallaInicio);

      const btnAnt = document.getElementById('btnPagAnt');
      const btnSig = document.getElementById('btnPagSig');
      if(btnAnt) btnAnt.addEventListener('click', () => { adminPage -= 1; render(); });
      if(btnSig) btnSig.addEventListener('click', () => { adminPage += 1; render(); });
    }

    render();
  } catch(e){
    card.querySelector('.sheet').innerHTML = `
      <h1 class="title">Resultados</h1>
      <p class="lead">No se pudieron cargar los resultados. Revisa tu conexión o la URL configurada.</p>
      <button class="btn-primary" id="btnVolverAdmin">Volver</button>
    `;
    document.getElementById('btnVolverAdmin').addEventListener('click', pantallaInicio);
  }
}
